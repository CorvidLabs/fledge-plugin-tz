# fledge.toml — project task definitions
# Docs: https://github.com/CorvidLabs/fledge#task-runner

[tasks]
build = "cargo build --release"
test = "cargo test"
lint = "cargo clippy -- -D warnings"
fmt = "cargo fmt --check"
smoke = "./target/release/fledge-tz --help >/dev/null && ./target/release/fledge-tz convert --help >/dev/null"

[lanes.verify]
description = "Format, lint, test, build, and smoke-test the timezone plugin"
steps = ["fmt", "lint", "test", "build", "smoke"]
